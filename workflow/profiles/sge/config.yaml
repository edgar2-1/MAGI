# SGE (Sun Grid Engine) cluster profile for MAGI
# Usage: magi --config config.yaml run --cores 100 --profile workflow/profiles/sge
# Or:    snakemake --profile workflow/profiles/sge

executor: cluster-generic
cluster-generic-submit-cmd: >-
  qsub
  -V
  -cwd
  -pe smp {threads}
  -l h_vmem={resources.mem_mb}M
  -l h_rt={resources.runtime}:00:00
  -o logs/{rule}.{wildcards}.o
  -e logs/{rule}.{wildcards}.e
  -N magi_{rule}

jobs: 50
latency-wait: 60
default-resources:
  mem_mb: 8000
  runtime: 2      # hours
  
set-resources:
  assembly:
    mem_mb: 64000
    runtime: 12
  classify_bacteriome:
    mem_mb: 32000
    runtime: 2
  classify_mycobiome:
    mem_mb: 32000
    runtime: 2
  classify_virome:
    mem_mb: 16000
    runtime: 1
